<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" role="img" aria-labelledby="title desc">
  <title id="title">Super Baranda</title>
  <desc id="desc">Logo inspirada na marca Super Baranda com formas vermelha, turquesa, verde e letras azuis.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <rect x="38" y="18" width="54" height="54" rx="8" transform="rotate(45 65 45)" fill="#ef1d23"/>
    <rect x="104" y="6" width="54" height="54" rx="8" transform="rotate(45 131 33)" fill="#008e85"/>
    <rect x="170" y="18" width="54" height="54" rx="8" transform="rotate(45 197 45)" fill="#45bf0b"/>
    <rect x="91" y="24" width="76" height="54" rx="9" transform="rotate(-6 129 51)" fill="#19158c"/>
    <text x="129" y="62" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#ffffff">SB</text>
    <circle cx="88" cy="36" r="8" fill="#19158c"/>
    <circle cx="103" cy="78" r="8" fill="#19158c"/>
    <circle cx="162" cy="77" r="8" fill="#19158c"/>
    <circle cx="177" cy="62" r="8" fill="#19158c"/>
  </g>
  <text x="130" y="94" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="900" letter-spacing="6" fill="#ef1d23">SUPER</text>
  <text x="130" y="116" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="35" font-weight="900" fill="#19158c">BARANDA</text>
</svg>
